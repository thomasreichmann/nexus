name: Post-Merge

on:
    push:
        branches: [main]
    workflow_dispatch:

concurrency:
    group: post-merge-main
    cancel-in-progress: false

jobs:
    migrate:
        name: Apply DB migrations
        runs-on: ubuntu-latest
        steps:
            - name: Checkout
              uses: actions/checkout@v4

            - name: Read Node version
              id: node-version
              run: echo "version=$(cat .nvmrc)" >> $GITHUB_OUTPUT

            - name: Setup pnpm
              uses: pnpm/action-setup@v4

            - name: Setup Node.js
              uses: actions/setup-node@v4
              with:
                  node-version: ${{ steps.node-version.outputs.version }}
                  cache: 'pnpm'

            - name: Install dependencies
              run: pnpm install --frozen-lockfile

            - name: Apply migrations
              run: pnpm -F db db:migrate
              env:
                  DATABASE_URL: ${{ secrets.DATABASE_URL }}

    smoke-tests:
        name: Smoke Tests
        needs: migrate
        runs-on: ubuntu-latest

        steps:
            - name: Checkout
              uses: actions/checkout@v4

            - name: Read Node version
              id: node-version
              run: echo "version=$(cat .nvmrc)" >> $GITHUB_OUTPUT

            - name: Setup pnpm
              uses: pnpm/action-setup@v4

            - name: Setup Node.js
              uses: actions/setup-node@v4
              with:
                  node-version: ${{ steps.node-version.outputs.version }}
                  cache: 'pnpm'

            - name: Install dependencies
              run: pnpm install --frozen-lockfile

            - name: Get Playwright version
              id: playwright-version
              run: echo "version=$(pnpm -F web exec playwright --version | awk '{print $2}')" >> $GITHUB_OUTPUT

            - name: Cache Playwright browsers
              uses: actions/cache@v4
              with:
                  path: ~/.cache/ms-playwright
                  key: playwright-${{ runner.os }}-${{ steps.playwright-version.outputs.version }}

            - name: Install Playwright browsers
              run: pnpm -F web exec playwright install --with-deps chromium

            - name: Run smoke tests
              run: pnpm -F web test:e2e:smoke
              env:
                  NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
                  NEXT_PUBLIC_SUPABASE_PUBLISHABLE_KEY: ${{ secrets.NEXT_PUBLIC_SUPABASE_PUBLISHABLE_KEY }}
                  NEXT_PUBLIC_STRIPE_PUBLIC_KEY: ${{ secrets.NEXT_PUBLIC_STRIPE_PUBLIC_KEY }}
                  NEXT_PUBLIC_APP_URL: ${{ secrets.NEXT_PUBLIC_APP_URL }}
                  DATABASE_URL: ${{ secrets.DATABASE_URL }}
                  SUPABASE_SECRET_KEY: ${{ secrets.SUPABASE_SECRET_KEY }}
                  AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
                  AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
                  AWS_REGION: ${{ secrets.AWS_REGION }}
                  S3_BUCKET: ${{ secrets.S3_BUCKET }}
                  SQS_QUEUE_URL: ${{ secrets.SQS_QUEUE_URL }}
                  STRIPE_SECRET_KEY: ${{ secrets.STRIPE_SECRET_KEY }}
                  STRIPE_WEBHOOK_SECRET: ${{ secrets.STRIPE_WEBHOOK_SECRET }}
                  BETTER_AUTH_SECRET: ${{ secrets.BETTER_AUTH_SECRET }}
