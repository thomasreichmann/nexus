name: Post-Merge

on:
    push:
        branches: [main]
    workflow_dispatch:

concurrency:
    group: post-merge-main
    cancel-in-progress: false

jobs:
    migrate:
        name: Apply DB migrations (dev)
        runs-on: ubuntu-latest
        timeout-minutes: 10
        steps:
            - name: Checkout
              uses: actions/checkout@v4

            - name: Setup Node and pnpm
              uses: ./.github/actions/setup-node-pnpm

            - name: Apply migrations
              run: pnpm -F db db:migrate
              env:
                  DATABASE_URL: ${{ secrets.DATABASE_URL }}

    # Prod gates on the dev apply (same SQL against a schema-identical DB acts
    # as a canary) but deliberately NOT on smoke-tests: e2e can fail for
    # reasons unrelated to migrations (browsers, S3, Stripe), and gating prod
    # on it would leave prod drifted whenever e2e flakes.
    migrate-prod:
        name: Apply DB migrations (prod)
        needs: migrate
        runs-on: ubuntu-latest
        timeout-minutes: 10
        steps:
            - name: Checkout
              uses: actions/checkout@v4

            - name: Setup Node and pnpm
              uses: ./.github/actions/setup-node-pnpm

            - name: Verify DATABASE_URL_PROD secret is configured
              env:
                  DATABASE_URL: ${{ secrets.DATABASE_URL_PROD }}
              run: |
                  if [ -z "$DATABASE_URL" ]; then
                      echo "::error::secret DATABASE_URL_PROD is not configured (see docs/infra/supabase-manual-setup.md)"
                      exit 1
                  fi

            - name: Apply migrations
              run: pnpm -F db db:migrate
              env:
                  DATABASE_URL: ${{ secrets.DATABASE_URL_PROD }}

    smoke-tests:
        name: Smoke Tests
        needs: migrate
        runs-on: ubuntu-latest
        timeout-minutes: 15
        # e2e runs against a production build (next build + next start), so the
        # build step and the test step both need these at build/runtime.
        env:
            NEXT_PUBLIC_APP_URL: ${{ secrets.NEXT_PUBLIC_APP_URL }}
            DATABASE_URL: ${{ secrets.DATABASE_URL }}
            AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
            AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
            AWS_REGION: ${{ secrets.AWS_REGION }}
            S3_BUCKET: ${{ secrets.S3_BUCKET }}
            SQS_QUEUE_URL: ${{ secrets.SQS_QUEUE_URL }}
            STRIPE_SECRET_KEY: ${{ secrets.STRIPE_SECRET_KEY }}
            STRIPE_WEBHOOK_SECRET: ${{ secrets.STRIPE_WEBHOOK_SECRET }}
            RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
            RESEND_FROM_EMAIL: ${{ secrets.RESEND_FROM_EMAIL }}
            BETTER_AUTH_SECRET: ${{ secrets.BETTER_AUTH_SECRET }}

        steps:
            - name: Checkout
              uses: actions/checkout@v4

            - name: Setup Node and pnpm
              uses: ./.github/actions/setup-node-pnpm

            - name: Get Playwright version
              id: playwright-version
              run: echo "version=$(pnpm -F web exec playwright --version | awk '{print $2}')" >> "$GITHUB_OUTPUT"

            - name: Cache Playwright browsers
              uses: actions/cache@v4
              with:
                  path: ~/.cache/ms-playwright
                  key: playwright-${{ runner.os }}-${{ steps.playwright-version.outputs.version }}

            - name: Install Playwright OS dependencies
              timeout-minutes: 5
              run: pnpm -F web exec playwright install-deps chromium

            - name: Install Playwright browsers
              timeout-minutes: 5
              run: pnpm -F web exec playwright install chromium

            # Build the production bundle (and workspace deps, including
            # trpc-devtools) up front so a build failure fails fast here with
            # full logs. The Playwright webServer rebuilds via the same turbo
            # task, so this warms the cache and that rebuild is a no-op hit.
            - name: Build app and workspace packages
              run: pnpm exec turbo run build --filter=@nexus/web

            - name: Run smoke tests
              run: pnpm -F web test:e2e:smoke
